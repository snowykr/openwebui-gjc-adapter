name: Real OpenWebUI E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-openwebui-e2e:
    name: Real OpenWebUI E2E
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: real-openwebui-e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Run real OpenWebUI E2E
        env:
          E2E_ADAPTER_BASE_URL: ${{ vars.E2E_ADAPTER_BASE_URL }}
          E2E_OPENWEBUI_BASE_URL: ${{ vars.E2E_OPENWEBUI_BASE_URL }}
          E2E_REAL_PROJECT_DIR: ${{ vars.E2E_REAL_PROJECT_DIR }}
          E2E_ADAPTER_API_TOKEN: ${{ secrets.E2E_ADAPTER_API_TOKEN }}
          E2E_OPENWEBUI_API_TOKEN: ${{ secrets.E2E_OPENWEBUI_API_TOKEN }}
          E2E_OPENWEBUI_OWNER_USER_ID: ${{ secrets.E2E_OPENWEBUI_OWNER_USER_ID }}
          E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          E2E_ARTIFACT_DIR: ${{ runner.temp }}/real-openwebui-e2e
        run: bun run e2e:real-openwebui
      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: real-openwebui-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/real-openwebui-e2e
          if-no-files-found: warn
          retention-days: 14
