name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run check


  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run test

  supply-chain:
    name: Supply chain (probationary)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Reject blocked lifecycle scripts
        run: |
          set +e
          bun pm untrusted > "$RUNNER_TEMP/bun-untrusted.txt" 2>&1
          status=$?
          set -e
          bun scripts/ci-bun-untrusted-policy.ts "$status" "$RUNNER_TEMP/bun-untrusted.txt"
      - name: Reject unreviewed dependency changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git worktree add --detach "$RUNNER_TEMP/base" "$BASE_SHA"
          BASE_ROOT="$RUNNER_TEMP/base" HEAD_ROOT="$GITHUB_WORKSPACE" BASE_SHA="$BASE_SHA" HEAD_SHA="$HEAD_SHA" bun --cwd "$RUNNER_TEMP/base" ./scripts/ci-dependency-diff-policy.ts
  package-consumer:
    name: Package consumer (probationary)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - name: Pack package without lifecycle scripts
        run: bun pm pack --ignore-scripts --destination "$RUNNER_TEMP/package"
      - name: Install and import the packed package
        run: |
          consumer="$RUNNER_TEMP/consumer"
          mkdir -p "$consumer"
          printf '%s\n' '{"name":"adapter-package-consumer","private":true,"type":"module"}' > "$consumer/package.json"
          set -- "$RUNNER_TEMP"/package/*.tgz
          test "$#" -eq 1
          bun add --cwd "$consumer" --ignore-scripts "$1"
          bun --cwd "$consumer" -e 'const root = await import("openwebui-gjc-adapter"); const cli = await import("openwebui-gjc-adapter/cli"); if (root.buildHealthReport().status !== "ok") throw new Error("root health export failed"); if (typeof cli.buildAdapterServerOptionsFromEnv !== "function") throw new Error("CLI export missing"); const resolved = import.meta.resolve("openwebui-gjc-adapter"); if (!resolved.includes("/node_modules/openwebui-gjc-adapter/")) throw new Error(`package resolved outside consumer: ${resolved}`);'
